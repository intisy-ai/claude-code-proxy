name: Publish

# One release = one `v*` tag. claude-code-proxy is consumed as a git SUBMODULE (not npm), so this
# publishes ONLY the JVM ProxyPlugin jar as a github release asset on the v-release, so the
# example-server org-scan finds `claude-code-proxy-proxy.jar` on releases/latest. The npm build +
# vitest run first purely as CI gates (they validate the TeaVM single-source path: Java 429 synth
# → transpiled JS → the anthropic.test.ts parity case).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the v-release for the jar asset

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Guard against runaway patch versions
        run: |
          PATCH="${GITHUB_REF_NAME##*.}"
          if [ "${PATCH:-0}" -ge 20 ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} has patch >= 20 - bump the minor version (reset patch) instead of more patches."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # `npm run build` runs the TeaVM step (java → src/generated/*.teavm.js), which needs a JDK + gradle.
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # CI gates: build (incl. TeaVM transpile) + the parity suite must be green before we ship the jar.
      - run: npm install
      - run: npm run build
      - run: npx vitest run

      # Publish the ProxyPlugin jar onto the v-release. github.token (contents:write) suffices to create
      # the release; the module needs no published dependency (compileOnly :routing from the submodule).
      - run: chmod +x java/gradlew
      - name: Publish proxy jar
        working-directory: java
        run: ./gradlew :claude-code-proxy-plugin:jar :claude-code-proxy-plugin:publishGithub -Partifact_version=${{ github.ref_name }} -x test -x compileTestJava
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
